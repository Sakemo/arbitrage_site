{% extends "layouts/base.html" %}

{% block title %} Editar Usuário {% endblock %}

{% block stylesheets %}
<style>
    .form-control .text-primary option {
        background: #1B1F24;
        color: #C2C4C8;
    }

    .icon-button {
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 60%;
    }

    .icon-button:hover i {
        color: rgba(255, 255, 255, 0.6);
    }

    .icon-button:hover .icon-container {
        border-color: rgba(255, 255, 255, 0.6);
    }

    .icon-button:focus {
        outline: none;
    }

    .icon-button i {
        color: white; 
        font-size: 24px;
    }
</style>
{% endblock stylesheets %}

{% block content %}
<div class="content">
    <div class="container mt-5">
        <h2 class="mb-4">Editar Usuário</h2>
        <div class="card"> 
            <div class="card-body">
                <form id="userEditForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control text-white" id="username" value="{{ user.username }}" readonly>
                    </div>
                    <div class="form-group"> 
                        <input type="checkbox" id="is_admin" {% if user.is_admin %}checked{% endif %}>
                        <label for="is_admin">Admin</label>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Nova senha</label>
                        <input type="text" class="form-control text-white" id="newPassword" placeholder="Digite uma nova senha">
                    </div>
                    <div class="form-group">
                        <label for="date_expiry">Data de Expiração</label>
                        <input type="date" class="form-control text-white" id="date_expiry" value="{{ date_expiry }}">
                    </div>
                    
                    <div class="row">
                        <div class="col-12 col-md-6">
                            <button type="button" class="btn btn-primary btn-block" id="updateUser">Salvar mudanças</button>
                        </div>
                        <div class="col-12 col-md-6">
                            <a href="/" class="btn btn-danger btn-block">Cancelar</a>
                        </div>
                    </div>
                    
                    
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block javascripts %}
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
<script>
    document.getElementById('updateUser').addEventListener('click', async function () {
        const username = document.getElementById('username').value;
        const is_admin = document.getElementById('is_admin').checked;
        const newPassword = document.getElementById('newPassword').value;
        const date_expiry = document.getElementById('date_expiry').value;

        const baseUrl = window.location.origin;
        const response = await fetch(`${baseUrl}/update_user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: username,
                is_admin: is_admin,
                newPassword: newPassword,
                date_expiry: date_expiry
            })
        });
        const result = await response.json();
        if (response.ok) {
            swal({
                title: "Sucesso!",
                text: "As informações do usuário foram atualizadas com sucesso.",
                icon: "success",
            }).then(() => {
                window.location.href = "/users";
            });
        } else {
            swal({
                title: "Erro!",
                text: result.message || "Não foi possível atualizar as informações do usuário. Por favor, tente novamente.",
                icon: "error",
            });
        }
    });
</script>
{% endblock javascripts %}
